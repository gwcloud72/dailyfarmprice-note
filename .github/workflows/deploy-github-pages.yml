name: Deploy Farm Price Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # 매일 07:10 KST 실행. cron은 UTC 기준입니다.
    - cron: "10 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --no-audit --no-fund --prefer-online; then
              echo "의존성 설치 완료"
              exit 0
            fi

            echo "npm ci 실패. npm 캐시와 node_modules를 정리한 뒤 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          echo "의존성 설치에 실패했습니다. package-lock.json과 npm 로그를 확인해주세요."
          exit 1

      - name: Generate crop price data
        run: npm run update:data
        env:
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
          KAMIS_FETCH_ENABLED: ${{ vars.KAMIS_FETCH_ENABLED || 'true' }}
          KAMIS_PRODUCTS_JSON: ${{ vars.KAMIS_PRODUCTS_JSON }}
          LOOKBACK_DAYS: "90"
          KAMIS_PRICE_TYPE: ${{ vars.KAMIS_PRICE_TYPE || 'retail' }}

      - name: Generate Gemini AI reports
        run: npm run update:ai-report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORT_ENABLED: ${{ vars.GEMINI_REPORT_ENABLED || 'true' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          REPORT_RANGE_DAYS: "30"

      - name: Validate static data
        run: npm run validate:data

      - name: Build React app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
