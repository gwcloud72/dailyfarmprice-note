name: Deploy Farm Price Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "10 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_ENV || true
          unset NPM_CONFIG_PRODUCTION || true
          unset NPM_CONFIG_OMIT || true

          if grep -qE 'localhost|file:|internal[.]api|applied[-]caas' package-lock.json; then
            echo "package-lock.json에 내부 registry 주소가 남아 있습니다. npm public registry 기준 lockfile로 갱신해야 합니다."
            exit 1
          fi

          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

          rm -rf node_modules
          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/; then
              break
            fi
            echo "npm ci 실패. 캐시 정리 후 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          if [ ! -x ./node_modules/.bin/vite ]; then
            echo "vite 실행 파일이 없어 devDependencies를 다시 설치합니다."
            npm install --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/
          fi

          test -x ./node_modules/.bin/vite
          ./node_modules/.bin/vite --version


      - name: Validate GitHub Actions env contract
        shell: bash
        env:
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
          KAMIS_FETCH_ENABLED: ${{ vars.KAMIS_FETCH_ENABLED }}
          KAMIS_PRODUCTS_JSON: ${{ vars.KAMIS_PRODUCTS_JSON }}
          KAMIS_SKIP_EMPTY_PRODUCTS: ${{ vars.KAMIS_SKIP_EMPTY_PRODUCTS }}
          KAMIS_REQUIRE_FULL_REGION_COVERAGE: ${{ vars.KAMIS_REQUIRE_FULL_REGION_COVERAGE }}
          LOOKBACK_DAYS: "90"
          KAMIS_PRICE_TYPE: ${{ vars.KAMIS_PRICE_TYPE }}
          NEWS_CLIENT_ID: ${{ secrets.NEWS_CLIENT_ID }}
          NEWS_CLIENT_SECRET: ${{ secrets.NEWS_CLIENT_SECRET }}
          NEWS_FETCH_ENABLED: ${{ vars.NEWS_FETCH_ENABLED }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORTS_ENABLED: ${{ vars.GEMINI_REPORTS_ENABLED }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: npm run actions:check

      - name: Generate crop price data
        shell: bash
        env:
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
          KAMIS_FETCH_ENABLED: ${{ vars.KAMIS_FETCH_ENABLED }}
          KAMIS_PRODUCTS_JSON: ${{ vars.KAMIS_PRODUCTS_JSON }}
          KAMIS_SKIP_EMPTY_PRODUCTS: ${{ vars.KAMIS_SKIP_EMPTY_PRODUCTS }}
          KAMIS_REQUIRE_FULL_REGION_COVERAGE: ${{ vars.KAMIS_REQUIRE_FULL_REGION_COVERAGE }}
          LOOKBACK_DAYS: "90"
          KAMIS_PRICE_TYPE: ${{ vars.KAMIS_PRICE_TYPE }}
        run: |
          set -euo pipefail
          if [ "${KAMIS_FETCH_ENABLED:-true}" = "false" ]; then
            echo "KAMIS_FETCH_ENABLED=false 이므로 데이터 수집을 건너뜁니다."
            exit 0
          fi
          if [ -z "${KAMIS_CERT_ID:-}" ] || [ -z "${KAMIS_CERT_KEY:-}" ]; then
            echo "KAMIS 인증 정보가 설정되지 않아 데이터 수집을 건너뜁니다. 기존 데이터 또는 fallback 화면로 빌드합니다."
            exit 0
          fi
          npm run update:data

      - name: Generate summary reports
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORTS_ENABLED: ${{ vars.GEMINI_REPORTS_ENABLED }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: |
          set -euo pipefail
          npm run update:ai-report || echo "요약 리포트 갱신을 건너뜁니다."

      - name: Generate market news
        shell: bash
        env:
          NEWS_CLIENT_ID: ${{ secrets.NEWS_CLIENT_ID }}
          NEWS_CLIENT_SECRET: ${{ secrets.NEWS_CLIENT_SECRET }}
          NEWS_FETCH_ENABLED: ${{ vars.NEWS_FETCH_ENABLED }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS }}
        run: |
          set -euo pipefail
          npm run update:news || echo "시장 동향 수집을 건너뜁니다."

      - name: Run deployment checks
        run: npm run deploy:check

      - name: Commit refreshed data
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/data/crop-prices.json public/data/ai-reports.json public/data/market-news.json; then
            echo "반영할 데이터 변경을 확인했습니다."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/crop-prices.json public/data/ai-reports.json public/data/market-news.json
          git commit -m "농산물 가격 데이터 자동 갱신 [skip ci]"
          git push origin main

      - name: Build React app
        env:
          VITE_DATA_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
